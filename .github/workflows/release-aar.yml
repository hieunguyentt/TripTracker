name: Build & Release AAR

on:
  push:
    tags:
      - 'v*'  # Triggers on: git tag v1.0.37 && git push origin v1.0.37

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Build AAR
        run: |
          cd android
          chmod +x ../gradlew
          ../gradlew :app:assembleRelease

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Rename AAR
        run: |
          cp android/app/build/outputs/aar/app-release.aar \
             triptracking-android-${{ steps.version.outputs.VERSION }}.aar

      - name: Create GitHub Release & attach AAR
        uses: softprops/action-gh-release@v2
        with:
          files: triptracking-android-${{ steps.version.outputs.VERSION }}.aar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
