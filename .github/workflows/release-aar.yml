name: Build & Release AAR

on:
  push:
    tags:
      - '**'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. 1.0.42)'
        required: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build AAR
        run: |
          cd triptracking-library
          chmod +x gradlew
          ./gradlew :android:assembleRelease

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Find and rename AAR
        run: |
          AAR_FILE=$(find triptracking-library/android/build/outputs/aar -name "*.aar" | head -1)
          echo "Found AAR: $AAR_FILE"
          cp "$AAR_FILE" triptracking-android-${{ steps.version.outputs.VERSION }}.aar

      - name: Create GitHub Release & attach AAR
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          files: triptracking-android-${{ steps.version.outputs.VERSION }}.aar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
